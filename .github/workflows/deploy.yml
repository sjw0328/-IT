name: Deploy toronhaja (SEO build)

# 트리거:
#  · main 푸시 (코드 변경 배포)
#  · 3시간마다 (cron) — 새 토론/집계를 정적 페이지·sitemap 에 반영
#  · 수동 실행 (Actions 탭 → Run workflow) — 새 토론 즉시 반영하고 싶을 때
#  · repository_dispatch(type: rebuild) — Supabase DB 웹훅에서 핑 보내 즉시 재빌드(선택)
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
  repository_dispatch:
    types: [ rebuild ]

permissions:
  contents: read
  pages: write
  id-token: write

# 동시에 한 배포만 — 진행 중이면 최신 것으로 교체
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build SEO pages + sitemap
        env:
          # 사이트 절대 origin (sitemap/OG/canonical). 커스텀 도메인이면
          # 리포 Settings → Secrets and variables → Actions → Variables 에
          # SITE_ORIGIN 을 추가해 덮어쓰세요 (기본값: 토론하자.kro.kr).
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN || 'https://xn--6o2bu1z0rh3yd.kro.kr' }}
        run: node scripts/build-seo.mjs

      # 사이트 파일이 저장소 루트에 있으므로 루트(.) 전체를 배포한다.
      # CNAME 파일도 루트에 있어 커스텀 도메인이 그대로 유지된다.
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
