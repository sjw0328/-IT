<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>토론하자 · 찬반이 갈리는 실시간 토론</title>
<meta name="description" content="한 줄로 입장을 고르고, 근거로 부딪쳐라. 찬반이 진짜로 갈리는 주제만 모은 실시간 토론 플랫폼." />
<meta name="theme-color" content="#0F1217" />
<meta property="og:type" content="website" />
<meta property="og:site_name" content="토론하자" />
<meta property="og:title" content="토론하자 · 찬반이 갈리는 실시간 토론" />
<meta property="og:description" content="입장을 고르고 근거로 부딪쳐라. 당신의 의견은 몇 %?" />
<meta property="og:image" content="og.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="토론하자 · 찬반이 갈리는 실시간 토론" />
<meta name="twitter:image" content="og.png" />
<link rel="icon" type="image/png" href="favicon-32.png" />
<link rel="apple-touch-icon" href="favicon-180.png" />
<link rel="manifest" href="site.webmanifest" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<link rel="stylesheet" href="style.css" />
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body>

<!-- ══ SCREEN 1 — 메인 ══ -->
<div id="screen-main" class="screen active">
  <header class="topbar">
    <a class="logo" href="index.html" style="font-size:46px"><span class="l1">토론</span><span class="l2">하자</span><span class="dot">.</span></a>
    <div class="search-wrap">
      <div class="search-input">
        <svg width="17" height="17"><use href="#ic-search"/></svg>
        <input type="text" id="searchInput" placeholder="토론 주제 검색 · #해시태그" />
      </div>
    </div>
    <span class="live-counter"><span class="live-dot"></span><b>1</b>명 접속중</span>
    <button class="me-chip" id="meChip" title="닉네임 바꾸기"></button>
    <a class="btn accent" href="create.html"><svg width="15" height="15"><use href="#ic-plus"/></svg>토론 열기</a>
    <a class="btn" href="admin.html"><svg width="14" height="14"><use href="#ic-shield"/></svg>관리자</a>
  </header>

  <div class="app-body">
    <nav class="sidebar">
      <div class="sidebar-label">카테고리</div>
      <div class="nav-item on" data-cat="전체"><span class="nav-dot" style="background:var(--a)"></span>전체</div>
      <div class="nav-item" data-cat="정치"><span class="nav-dot" style="background:var(--cat-politics)"></span>정치</div>
      <div class="nav-item" data-cat="축구"><span class="nav-dot" style="background:var(--cat-soccer)"></span>축구</div>
      <div class="nav-item" data-cat="연예"><span class="nav-dot" style="background:var(--cat-ent)"></span>연예</div>
      <div class="nav-item" data-cat="게임"><span class="nav-dot" style="background:var(--cat-game)"></span>게임</div>
      <div class="nav-item" data-cat="사회"><span class="nav-dot" style="background:var(--cat-society)"></span>사회</div>
      <div class="nav-item" data-cat="경제"><span class="nav-dot" style="background:var(--cat-econ)"></span>경제</div>
    </nav>

    <main class="feed">
      <div id="annBanner"></div>
      <div class="mcat-bar" id="mcatBar">
        <div class="nav-item on" data-cat="전체"><span class="nav-dot" style="background:var(--a)"></span>전체</div>
        <div class="nav-item" data-cat="정치"><span class="nav-dot" style="background:var(--cat-politics)"></span>정치</div>
        <div class="nav-item" data-cat="축구"><span class="nav-dot" style="background:var(--cat-soccer)"></span>축구</div>
        <div class="nav-item" data-cat="연예"><span class="nav-dot" style="background:var(--cat-ent)"></span>연예</div>
        <div class="nav-item" data-cat="게임"><span class="nav-dot" style="background:var(--cat-game)"></span>게임</div>
        <div class="nav-item" data-cat="사회"><span class="nav-dot" style="background:var(--cat-society)"></span>사회</div>
        <div class="nav-item" data-cat="경제"><span class="nav-dot" style="background:var(--cat-econ)"></span>경제</div>
      </div>
      <div class="sort-bar">
        <h2>실시간 토론</h2>
        <div class="sort-chips">
          <span class="chip sort-chip is-on" data-sort="hot">실시간순</span>
          <span class="chip sort-chip" data-sort="close"><svg width="13" height="13" style="margin-right:-1px"><use href="#ic-scale"/></svg>접전순</span>
          <span class="chip sort-chip" data-sort="pop">인기순</span>
          <span class="chip sort-chip" data-sort="new">최신순</span>
        </div>
      </div>
      <div class="card-list" id="feed"></div>
    </main>

    <aside class="rail">
      <div class="card rank-card">
        <div class="rank-card-head">
          <svg width="17" height="17" style="color:var(--warn)"><use href="#ic-fire"/></svg>
          실시간 랭킹
          <span class="live-dot" style="margin-left:auto"></span>
          <span style="font-size:11px;color:var(--live);font-weight:700">LIVE</span>
        </div>
        <div class="rank-list" id="rankList"></div>
      </div>
      <div class="card pulse-card">
        <div class="pulse-label">지금 이 순간</div>
        <div class="pulse-grid">
          <div><div class="pulse-num tnum" style="color:var(--a-bright)" id="pulseCPM">0</div><div class="pulse-desc">분당 새 댓글</div></div>
          <div><div class="pulse-num tnum" style="color:var(--b-bright)" id="pulseActive">0</div><div class="pulse-desc">진행중 토론</div></div>
        </div>
      </div>
    </aside>
  </div>

  <a class="mfab" href="create.html" aria-label="토론 열기"><svg width="21" height="21"><use href="#ic-plus"/></svg>토론 열기</a>
</div>

<!-- ══ SCREEN 2 — 상세 ══ -->
<div id="screen-detail" class="screen">
  <header class="topbar-sm">
    <button class="btn ghost" data-back="screen-main" style="padding:0 10px;gap:6px">
      <svg width="16" height="16" style="transform:rotate(180deg)"><use href="#ic-arrow-r"/></svg>목록
    </button>
    <a class="logo" href="index.html" style="font-size:26px"><span class="l1">토론</span><span class="l2">하자</span><span class="dot">.</span></a>
    <div style="flex:1"></div>
    <span class="live-counter"><span class="live-dot"></span><b id="detailLive">0</b>명 참여중</span>
    <button class="btn" id="shareBtn" style="margin-left:8px"><svg width="14" height="14"><use href="#ic-share"/></svg>공유</button>
  </header>

  <div class="detail-body">
    <div class="detail-top" id="detailTop"></div>
    <h1 class="detail-title" id="detailTitle"></h1>
    <div class="card detail-hero-card" id="detailHero"></div>

    <div class="side-tabs" id="sideTabs"></div>

    <div class="cols" id="detailCols">
      <section class="col" data-side="a">
        <div class="col-head a" id="headA"></div>
        <div id="colA"></div>
      </section>
      <div class="col-divider"></div>
      <section class="col" data-side="b">
        <div class="col-head b" id="headB"></div>
        <div id="colB"></div>
      </section>
    </div>
  </div>

  <div class="actionbar">
    <div class="actionbar-inner">
      <div style="width:300px">
        <div class="vote-label">내 입장 선택</div>
        <div class="vote-row" id="voteRow">
          <button class="vote-btn a" data-side="a">나는 찬성 <span class="pct" id="pctA">0%</span></button>
          <button class="vote-btn b" data-side="b">나는 반대 <span class="pct" id="pctB">0%</span></button>
        </div>
      </div>
      <div class="input-area">
        <div class="input-side-label" id="inputLabel" style="color:var(--muted)">먼저 찬성/반대 입장을 선택하세요</div>
        <div class="input-wrap" id="inputWrap">
          <input type="text" id="commentInput" placeholder="입장을 선택하면 댓글을 작성할 수 있어요" disabled />
          <button class="send-btn" id="sendBtn" style="background:var(--surface-3);color:var(--muted)">등록</button>
        </div>
      </div>
    </div>
  </div>
</div>

<script src="icons.js"></script>
<script src="supabase.js"></script>
<script src="share.js"></script>
<script src="app.js"></script>
<script src="onboard.js"></script>
<script src="pwa.js"></script>
</body>
</html>
