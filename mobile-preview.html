<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>토론하자 · 모바일 미리보기 (데스크탑 테스트용)</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
<style>
  :root{
    --bg:#0A0C10; --panel:#161B22; --panel-2:#1C232D; --line:rgba(255,255,255,.08);
    --line-2:rgba(255,255,255,.14); --text:#F4F6FA; --sub:#9AA4B2; --muted:#626C7A;
    --a:#4D82F3; --a-bright:#7AA5FF; --b:#ED5470;
    --font:'Pretendard',-apple-system,system-ui,sans-serif; --disp:'Black Han Sans',var(--font);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{
    background:
      radial-gradient(90% 60% at 50% -10%, #11161f, transparent 60%),
      var(--bg);
    color:var(--text); font-family:var(--font);
    display:flex; flex-direction:column; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  button{font-family:inherit;cursor:pointer;color:inherit}
  a{color:inherit;text-decoration:none}

  /* ── toolbar ── */
  .bar{
    flex:0 0 auto; display:flex; align-items:center; gap:18px; flex-wrap:wrap;
    padding:14px 22px; border-bottom:1px solid var(--line);
    background:rgba(15,18,23,.7); backdrop-filter:blur(12px);
  }
  .brand{display:inline-flex;align-items:baseline;gap:1px;font-family:var(--disp);font-size:26px;letter-spacing:-.5px;line-height:1;white-space:nowrap}
  .brand .l1{color:var(--text)} .brand .l2{color:var(--a)} .brand .dot{color:var(--b)}
  .brand small{font-family:var(--font);font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.4px;margin-left:8px}

  .group{display:flex;align-items:center;gap:8px}
  .group .lbl{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:.4px;text-transform:uppercase;margin-right:2px}

  .seg{display:flex;background:var(--panel);border:1px solid var(--line-2);border-radius:999px;padding:3px}
  .seg button{
    border:none;background:none;color:var(--sub);font-size:13px;font-weight:700;
    padding:7px 15px;border-radius:999px;white-space:nowrap;transition:.15s;
  }
  .seg button.on{background:var(--a);color:#fff}
  .seg.dev button.on{background:var(--panel-2);color:var(--text)}

  .icobtn{
    display:inline-flex;align-items:center;gap:7px;height:38px;padding:0 14px;border-radius:10px;
    background:var(--panel);border:1px solid var(--line-2);color:var(--text);
    font-size:13px;font-weight:700;transition:.15s;white-space:nowrap;
  }
  .icobtn:hover{border-color:var(--a-bright)}
  .spacer{flex:1}
  .dims{font-size:12.5px;font-weight:700;color:var(--sub);font-variant-numeric:tabular-nums;white-space:nowrap}
  .dims b{color:var(--text)}

  /* ── stage (세로 스크롤) ── */
  .stage{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;position:relative;scrollbar-width:thin;scrollbar-color:#2a313c transparent}
  .stage::-webkit-scrollbar{width:10px}
  .stage::-webkit-scrollbar-thumb{background:#262d38;border-radius:999px;border:3px solid var(--bg)}
  .stage::-webkit-scrollbar-thumb:hover{background:#323a47}
  .stage-inner{min-height:100%;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;justify-content:safe center;gap:16px;padding:28px 24px 56px}
  .hint{position:static;font-size:12px;color:var(--muted);font-weight:600;text-align:center;max-width:92%;line-height:1.5}

  .phone-scaler{flex:0 0 auto}
  .phone{
    position:relative; background:linear-gradient(150deg,#2a2f38,#0d0f13 60%);
    border-radius:54px; padding:14px;
    box-shadow:
      0 50px 110px -30px rgba(0,0,0,.85),
      0 0 0 2px rgba(255,255,255,.05) inset,
      0 0 0 7px #05070a;
  }
  .screen-wrap{position:relative;border-radius:42px;overflow:hidden;background:#000}
  .screen-wrap iframe{display:block;border:0;background:var(--bg)}

  /* OS 상태바 — 앱 콘텐츠가 카메라 밑에 깔리지 않도록 위에 배치 */
  .osbar{
    position:absolute; top:0; left:0; right:0; display:flex; align-items:center; justify-content:space-between;
    padding:0 20px; color:#fff; font-size:13px; font-weight:700; z-index:6; pointer-events:none; text-shadow:0 1px 3px rgba(0,0,0,.55);
  }
  .osbar .t{font-variant-numeric:tabular-nums}
  .osbar .r{display:inline-flex;align-items:center;gap:7px}
  .osbar .net{font-size:10.5px;letter-spacing:1.2px;font-weight:800;opacity:.85}
  .osbar .bat{position:relative;width:22px;height:11px;border:1.4px solid rgba(255,255,255,.65);border-radius:3px;display:inline-block}
  .osbar .bat::before{content:"";position:absolute;inset:1.6px;width:68%;background:#fff;border-radius:1px}
  .osbar .bat::after{content:"";position:absolute;right:-3px;top:3px;width:2px;height:5px;background:rgba(255,255,255,.65);border-radius:0 1px 1px 0}

  /* 카메라 — 상태바 정중앙 (기기별 모양) */
  .osbar .cam{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;justify-content:center;z-index:7}
  .cam .island{width:84px;height:22px;border-radius:999px;background:#05070a;display:flex;align-items:center;justify-content:flex-end;padding-right:11px}
  .cam .island::after{content:"";width:7px;height:7px;border-radius:50%;background:#161b22;box-shadow:0 0 0 1px rgba(255,255,255,.06)}
  .cam .punch{width:9px;height:9px;border-radius:50%;background:#05070a;box-shadow:0 0 0 1.5px rgba(255,255,255,.05)}
  .cam .speaker{display:flex;align-items:center;gap:9px}
  .cam .speaker .sp{width:36px;height:4px;border-radius:999px;background:#05070a}
  .cam .speaker .dot{width:7px;height:7px;border-radius:50%;background:#0a0e14;box-shadow:0 0 0 1px rgba(255,255,255,.05)}

  /* 홈 인디케이터 */
  .home-ind{position:absolute;bottom:0;left:0;right:0;height:20px;display:flex;align-items:center;justify-content:center;z-index:6;pointer-events:none}
  .home-ind::after{content:"";width:36%;max-width:140px;height:5px;border-radius:999px;background:rgba(255,255,255,.5)}

  .side-btn{position:absolute;background:#1a1e25;border-radius:3px}
  .sb1{left:-3px;top:120px;width:3px;height:34px}
  .sb2{left:-3px;top:168px;width:3px;height:58px}
  .sb3{left:-3px;top:238px;width:3px;height:58px}
  .sb4{right:-3px;top:150px;width:3px;height:86px}

  @media (max-width:720px){ .bar{gap:12px} .brand small,.group .lbl{display:none} }
</style>
</head>
<body>

<div class="bar">
  <span class="brand"><span class="l1">토론</span><span class="l2">하자</span><span class="dot">.</span><small>모바일 미리보기</small></span>

  <div class="group">
    <span class="lbl">화면</span>
    <div class="seg" id="pageSeg">
      <button class="on" data-page="index.html">메인 피드</button>
      <button data-page="create.html">토론 열기</button>
    </div>
  </div>

  <div class="group">
    <span class="lbl">기기</span>
    <div class="seg dev" id="devSeg"></div>
  </div>

  <div class="spacer"></div>
  <span class="dims" id="dims"></span>
  <button class="icobtn" id="rotateBtn">⟳ 가로/세로</button>
  <button class="icobtn" id="reloadBtn">↻ 새로고침</button>
  <a class="icobtn" id="openBtn" target="_blank">↗ 새 탭</a>
</div>

<div class="stage" id="stage">
  <div class="stage-inner">
    <div class="hint">실제 크기로 표시됩니다 · 아래로 스크롤하면 화면 전체를 볼 수 있어요</div>
    <div class="phone-scaler" id="scaler">
    <div class="phone" id="phone">
      <span class="side-btn sb1"></span><span class="side-btn sb2"></span>
      <span class="side-btn sb3"></span><span class="side-btn sb4"></span>
      <div class="screen-wrap" id="screenWrap">
        <div class="osbar" id="osbar">
          <span class="t">9:41</span>
          <div class="cam" id="cam"></div>
          <span class="r"><span class="net">5G</span><span class="bat"></span></span>
        </div>
        <iframe id="frame" src="index.html"></iframe>
        <div class="home-ind" id="homeInd"></div>
      </div>
    </div>
    </div>
  </div>
</div>

<script>
  const DEVICES = [
    { id:'ip15',  name:'iPhone 15 Pro', w:393, h:852, sb:46, cam:'island',  r:54 },
    { id:'ipse',  name:'iPhone SE',     w:375, h:667, sb:22, cam:'speaker', r:40, se:true },
    { id:'px8',   name:'Pixel 8',       w:412, h:915, sb:34, cam:'punch',   r:48 },
    { id:'gs24',  name:'Galaxy S24',    w:360, h:780, sb:32, cam:'punch',   r:46 },
    { id:'mini',  name:'작은 폰',        w:360, h:640, sb:26, cam:'punch',   r:38 },
  ];
  let curDev = DEVICES[0];
  let landscape = false;
  let curPage = 'index.html';

  const frame   = document.getElementById('frame');
  const phone   = document.getElementById('phone');
  const scaler  = document.getElementById('scaler');
  const stage   = document.getElementById('stage');
  const dimsEl  = document.getElementById('dims');
  const openBtn = document.getElementById('openBtn');
  const devSeg  = document.getElementById('devSeg');
  const osbar   = document.getElementById('osbar');
  const cam     = document.getElementById('cam');
  const homeInd = document.getElementById('homeInd');
  const screenWrap = document.getElementById('screenWrap');

  // build device buttons
  DEVICES.forEach((d,i)=>{
    const b = document.createElement('button');
    b.textContent = d.name; b.dataset.dev = d.id;
    if(i===0) b.classList.add('on');
    b.addEventListener('click', ()=>{
      curDev = d;
      [...devSeg.children].forEach(c=>c.classList.toggle('on', c===b));
      apply();
    });
    devSeg.appendChild(b);
  });

  function camHTML(type){
    if(type==='island')  return '<div class="island"></div>';
    if(type==='speaker') return '<div class="speaker"><span class="sp"></span><span class="dot"></span></div>';
    return '<div class="punch"></div>';
  }

  // 앱 콘텐츠를 카메라/상태바 높이만큼 아래로 — 실기기 safe-area 와 동일하게 시뮬레이션
  function injectSafe(){
    let d; try { d = frame.contentDocument; } catch(e){ return; }
    if(!d || !d.head) return;
    let st = d.getElementById('__camsafe');
    if(!st){ st = d.createElement('style'); st.id='__camsafe'; d.head.appendChild(st); }
    const sb = landscape ? 0 : curDev.sb;
    const hb = landscape ? 0 : 18;
    st.textContent =
      `.topbar{padding-top:calc(11px + ${sb}px)!important}` +
      `.topbar-sm{padding-top:${sb}px!important;min-height:calc(56px + ${sb}px)!important}` +
      `.tabbar{padding-bottom:calc(7px + ${hb}px)!important}` +
      `#view-home,#view-ballots,#view-profile{padding-bottom:calc(150px + ${hb}px)!important}` +
      `.actionbar{padding-bottom:calc(16px + ${hb}px)!important}` +
      `.edition-fab{bottom:calc(86px + ${hb}px)!important}` +
      `.edition-picker{bottom:calc(150px + ${hb}px)!important}`;
  }
  frame.addEventListener('load', injectSafe);

  function apply(){
    const w  = landscape ? curDev.h : curDev.w;
    const h  = landscape ? curDev.w : curDev.h;
    const sb = landscape ? 0 : curDev.sb;
    frame.style.width  = w + 'px';
    frame.style.height = h + 'px';
    osbar.style.height  = sb + 'px';
    osbar.style.display = sb ? 'flex' : 'none';
    cam.innerHTML = camHTML(curDev.cam);
    homeInd.style.display = (curDev.se || landscape) ? 'none' : 'flex';
    phone.style.borderRadius = curDev.r + 'px';
    screenWrap.style.borderRadius = (curDev.r - 12) + 'px';
    phone.classList.toggle('landscape', landscape);
    phone.classList.toggle('se', !!curDev.se);
    dimsEl.innerHTML = `<b>${curDev.name}</b> · 카메라아래 ${w} × ${h - sb}`;
    openBtn.href = curPage;
    injectSafe();
    fit();
  }

  function fit(){
    // 폭에 맞춰서만 축소(세로는 자르지 않음) → 세로 스크롤로 전체 확인.
    // zoom 은 레이아웃 박스까지 축소하므로 스크롤 영역이 정확히 맞는다.
    scaler.style.zoom = '1';
    const pr = phone.getBoundingClientRect();
    const availW = stage.clientWidth - 48;
    const s = Math.min(1, availW / pr.width);
    scaler.style.zoom = s;
  }

  // page tabs
  document.getElementById('pageSeg').addEventListener('click', e=>{
    const b = e.target.closest('[data-page]'); if(!b) return;
    [...e.currentTarget.children].forEach(c=>c.classList.toggle('on', c===b));
    curPage = b.dataset.page;
    frame.src = curPage;
    openBtn.href = curPage;
  });

  document.getElementById('rotateBtn').addEventListener('click', ()=>{ landscape=!landscape; apply(); });
  document.getElementById('reloadBtn').addEventListener('click', ()=>{ frame.src = frame.src; });

  window.addEventListener('resize', fit);
  apply();
</script>
</body>
</html>
