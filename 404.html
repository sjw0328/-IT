<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="robots" content="noindex" />
<meta name="theme-color" content="#F3F2EF" />
<link rel="icon" type="image/png" href="/favicon-32.png" />
<title>토론하자 · 불러오는 중…</title>
<style>
  html,body{height:100%;margin:0}
  body{display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;
       background:#F3F2EF;color:#1b1f24;
       font-family:Pretendard,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif}
  .spin{width:30px;height:30px;border-radius:50%;border:3px solid #d9d6cf;border-top-color:#1b1f24;
        animation:r .8s linear infinite}
  @keyframes r{to{transform:rotate(360deg)}}
  .t{font-size:15px;font-weight:600;letter-spacing:-.01em}
  a{color:#3a6df0;font-size:13px;text-decoration:none}
</style>
</head>
<body>
  <div class="spin"></div>
  <div class="t">토론하자 — 토론을 불러오는 중…</div>
  <a id="home" href="/">홈으로 가기</a>

  <!-- ─────────────────────────────────────────────────────────
       GitHub Pages 정적 호스팅 딥링크 폴백.
       아직 정적 페이지(/d/<id>/)가 생성되지 않은 새 토론이나, 잘못된 경로로
       들어오면 GitHub 가 이 404 를 돌려준다. 여기서 요청 경로에서 토론 id 를
       뽑아 앱 루트(?d=<id>)로 보내면, 앱이 상세를 열고 주소를 /d/<id> 로 정규화한다.
       (정적 페이지가 있는 토론은 GitHub 가 그 파일을 바로 주므로 이 파일은 안 거친다.)
       ───────────────────────────────────────────────────────── -->
  <script>
    (function () {
      var p = location.pathname;
      // /…/d/<id>  형태에서 base(앱 루트)와 id 를 분리
      var m = p.match(/^(.*?\/)d\/([^/]+)\/?$/);
      if (m) {
        var base = m[1], id = m[2];
        var extra = location.search ? location.search.replace(/^\?/, '&') : '';
        location.replace(base + '?d=' + id + extra + location.hash);
        return;
      }
      // 토론 경로가 아닌 진짜 404 → 홈으로
      var root = p.replace(/[^/]*$/, '');
      document.getElementById('home').setAttribute('href', root || '/');
      setTimeout(function () { location.replace(root || '/'); }, 1200);
    })();
  </script>
</body>
</html>
